<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>原型图 - 登录</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="login">
    <section class="login-panel">
      <aside class="login-showcase">
        <h1>权限管理系统</h1>
        <p>Spring Boot 3 + JDK 21 + PostgreSQL + Vue 3</p>
        <p class="small">支持用户管理、组织树、角色权限、按钮权限、行级数据权限与安全审计。</p>
        <p class="small">原型入口建议：登录后进入系统总览与各模块页面。</p>
      </aside>
      <section class="login-form">
        <h2>账号登录</h2>
        <div class="field">
          <label>用户名</label>
          <input value="smile-admin" />
        </div>
        <div class="field">
          <label>密码</label>
          <input type="password" value="******" />
        </div>
        <div class="field">
          <label>验证码</label>
          <input value="A7P9" />
        </div>
        <div class="actions">
          <a class="btn primary" href="./dashboard.html">登录并进入系统</a>
          <button class="btn">刷新验证码</button>
        </div>
        <p class="small" style="margin-top: 12px;">登录成功后将拉取角色/菜单/按钮权限，并动态生成前端可访问功能。</p>
      </section>
    </section>
  </main>
</body>
</html>
