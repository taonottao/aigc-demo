<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>原型图 - 系统总览</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand"><span class="brand-dot"></span> Admin Matrix</div>
      <nav class="nav">
        <a class="active" href="./dashboard.html">系统总览</a>
        <a href="./organizations.html">组织管理</a>
        <a href="./users.html">用户管理</a>
        <a href="./role-permission.html">角色权限</a>
        <a href="./security.html">日志与安全</a>
        <a href="./index.html">退出登录</a>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <div class="title">系统总览</div>
          <div class="meta">欢迎回来，smile-admin（超级管理员）</div>
        </div>
        <div class="actions">
          <button class="btn">导出日报</button>
          <a class="btn cyan" href="./users.html">新增用户</a>
        </div>
      </header>

      <section class="grid">
        <article class="card span-3"><h3>组织总数</h3><p class="kpi">36</p><span class="badge ok">树形结构正常</span></article>
        <article class="card span-3"><h3>启用用户</h3><p class="kpi">1,284</p><span class="badge ok">在线 214</span></article>
        <article class="card span-3"><h3>角色数量</h3><p class="kpi">48</p><span class="badge warn">12 个高权限</span></article>
        <article class="card span-3"><h3>今日告警</h3><p class="kpi">5</p><span class="badge danger">2 个需复核</span></article>

        <article class="card span-8">
          <h3>快捷工作台</h3>
          <div class="actions">
            <a class="btn" href="./organizations.html">组织树维护</a>
            <a class="btn" href="./users.html">用户增删改查</a>
            <a class="btn" href="./role-permission.html">角色权限绑定</a>
            <a class="btn" href="./security.html">查看登录日志</a>
          </div>
          <p class="small" style="margin-top:10px;">说明：组织和用户页面均为左树右列表，角色权限单独成页。</p>
        </article>

        <article class="card span-4">
          <h3>数据权限规则快照</h3>
          <table class="table">
            <thead><tr><th>模块</th><th>规则</th></tr></thead>
            <tbody>
              <tr><td>用户管理</td><td>本部门及子部门</td></tr>
              <tr><td>订单模块</td><td>仅本部门</td></tr>
              <tr><td>报表模块</td><td>全部数据</td></tr>
            </tbody>
          </table>
        </article>
      </section>
    </main>
  </div>
  <script src="./app.js"></script>
</body>
</html>
